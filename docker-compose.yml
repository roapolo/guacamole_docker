services:
  mariadb:
    image: mariadb:latest
    container_name: guacamole_mariadb
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      TZ: ${TZ}
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./init:/docker-entrypoint-initdb.d:ro
    networks:
      - guacamole_net

  guacd:
    image: guacamole/guacd:${GUACAMOLE_VERSION}
    container_name: guacamole_guacd
    restart: unless-stopped
    networks:
      - guacamole_net

  guacamole:
    image: guacamole/guacamole:${GUACAMOLE_VERSION}
    container_name: guacamole_app
    restart: unless-stopped
    depends_on:
      - mariadb
      - guacd
    environment:
      GUACD_HOSTNAME: guacd
      MYSQL_HOSTNAME: mariadb
      MYSQL_PORT: 3306
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      TZ: ${TZ}
    networks:
      - guacamole_net

  proxy:
    image: nginx:1.27-alpine
    container_name: guacamole_proxy
    restart: unless-stopped
    depends_on:
      - guacamole
    ports:
      - "${HTTP_PORT}:80"
      - "${HTTPS_PORT}:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs/tfg.crt:/etc/nginx/certs/tfg.crt:ro
      - ./certs/tfg.key:/etc/nginx/certs/tfg.key:ro
    networks:
      - guacamole_net

volumes:
  mariadb_data:

networks:
  guacamole_net:
    driver: bridge
